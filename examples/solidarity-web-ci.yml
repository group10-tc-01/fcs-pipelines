name: Solidarity Web CI

on:
  pull_request:
    branches: [main]
    paths:
      - src/**
      - public/**
      - angular.json
      - package.json
      - package-lock.json
      - tsconfig*.json
      - eslint.config.js
      - .postcssrc.json
      - Dockerfile
      - nginx.conf
      - .github/workflows/angular-web-ci.yml
  push:
    branches: [main]
    paths:
      - src/**
      - public/**
      - angular.json
      - package.json
      - package-lock.json
      - tsconfig*.json
      - eslint.config.js
      - .postcssrc.json
      - Dockerfile
      - nginx.conf
      - .github/workflows/angular-web-ci.yml
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write

jobs:
  ci:
    uses: group10-tc-01/fcs-pipelines/.github/workflows/angular-web-ci.yml@main
    with:
      app_name: fcs-solidarity-web
      node_version: "24"
      working_directory: .
      coverage_threshold: 80
      run_coverage: true
      dockerfile_path: Dockerfile
      docker_context: .
