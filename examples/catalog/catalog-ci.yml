name: Catalog CI

on:
  pull_request:
    branches: [main]
    paths:
      - src/**
      - tests/**
      - Directory.Build.props
      - Directory.Packages.props
      - .editorconfig
      - docker-compose.yml
      - .github/workflows/catalog-ci.yml
  push:
    branches: [main]
    paths:
      - src/**
      - tests/**
      - Directory.Build.props
      - Directory.Packages.props
      - .editorconfig
      - docker-compose.yml
      - .github/workflows/catalog-ci.yml
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write

jobs:
  ci:
    uses: group10-tc-01/fcs-pipelines/.github/workflows/dotnet-service-ci.yml@main
    with:
      service_name: catalog
      dotnet_version: 8.0.x
      solution_path: src/fcs.Catalog.WebApi/fcs.Catalog.WebApi.csproj
      unit_tests_path: tests/fcs.Catalog.UnitTests/fcs.Catalog.UnitTests.csproj
      integration_tests_path: tests/fcs.Catalog.IntegratedTests/fcs.Catalog.IntegratedTests.csproj
      test_environment: Test
      coverage_threshold: 80
      run_sonar: true
      sonar_project_key: group10-tc-01_fcs-catalog
      sonar_organization: group10-tc-01
      dockerfile_path: src/fcs.Catalog.WebApi/Dockerfile
      docker_context: .
    secrets: inherit
