name: Infrastructure

on:
  pull_request:
    branches: [main]
    paths:
      - terraform/**
      - .github/workflows/**
  push:
    branches: [main]
    paths:
      - terraform/**
      - .github/workflows/**
  workflow_dispatch:

jobs:
  terraform:
    uses: group10-tc-01/fcs-pipelines/.github/workflows/terraform-azure.yml@main
    with:
      working_directory: terraform
      environment: production
      apply: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
    secrets: inherit
