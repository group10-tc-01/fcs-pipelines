name: Reusable .NET Service Delivery To AKS

on:
  workflow_call:
    inputs:
      service_name:
        description: Short service name.
        type: string
        required: true
      image_name:
        description: Container image name without registry host.
        type: string
        required: true
      dockerfile_path:
        description: Dockerfile path.
        type: string
        required: true
      docker_context:
        description: Docker build context.
        type: string
        default: .
      azure_container_registry_name:
        description: Azure Container Registry name without azurecr.io.
        type: string
        required: true
      aks_resource_group:
        description: AKS resource group.
        type: string
        required: true
      aks_cluster_name:
        description: AKS cluster name.
        type: string
        required: true
      k8s_namespace:
        description: Kubernetes namespace.
        type: string
        default: default
      k8s_deployment_name:
        description: Kubernetes deployment name.
        type: string
        required: true
      k8s_container_name:
        description: Container name inside the Kubernetes deployment.
        type: string
        required: true
      k8s_manifests_path:
        description: Optional manifests path to apply before rollout.
        type: string
        default: ""
      environment:
        description: GitHub Environment name.
        type: string
        default: production
      healthcheck_url:
        description: Optional external healthcheck URL after rollout.
        type: string
        default: ""
      deploy_to_aks:
        description: Whether to deploy the pushed image to AKS.
        type: boolean
        default: false
      trivy_severity:
        description: Vulnerability severity levels that fail the image scan.
        type: string
        default: CRITICAL,HIGH
    secrets:
      AZURE_CONTAINER_REGISTRY_USERNAME:
        required: true
      AZURE_CONTAINER_REGISTRY_PASSWORD:
        required: true
      AKS_KUBECONFIG:
        required: false
      AKS_KEYVAULT_CLIENT_ID:
        required: false
      KEY_VAULT_NAME:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ inputs.environment }}-${{ inputs.service_name }}
  cancel-in-progress: false

jobs:
  build-scan-push:
    name: Build, scan, and push image
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.azure_container_registry_name }}.azurecr.io
          username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          REGISTRY="${{ inputs.azure_container_registry_name }}.azurecr.io"
          IMAGE="${REGISTRY}/${{ inputs.image_name }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="sha-${SHORT_SHA}"

          {
            echo "image_uri=${IMAGE}:${TAG}"
            echo "image_tag=${TAG}"
            echo "tags<<EOF"
            echo "${IMAGE}:${TAG}"
            if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
              echo "${IMAGE}:main"
            fi
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              echo "${IMAGE}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image_uri }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: ${{ inputs.trivy_severity }}

  deploy-aks:
    name: Deploy to AKS
    needs: build-scan-push
    if: ${{ inputs.deploy_to_aks }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      KUBECONFIG: /tmp/aks-kubeconfig
    steps:
      - name: Checkout
        if: ${{ inputs.k8s_manifests_path != '' }}
        uses: actions/checkout@v5

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Configure AKS kubeconfig
        shell: bash
        env:
          AKS_KUBECONFIG: ${{ secrets.AKS_KUBECONFIG }}
        run: |
          if [[ -z "${AKS_KUBECONFIG}" ]]; then
            echo "AKS_KUBECONFIG secret is required when deploy_to_aks is true." >&2
            exit 1
          fi

          printf '%s' "${AKS_KUBECONFIG}" > "${KUBECONFIG}"
          chmod 600 "${KUBECONFIG}"

      - name: Verify AKS access
        shell: bash
        run: kubectl --kubeconfig "${KUBECONFIG}" get namespace "${{ inputs.k8s_namespace }}"

      - name: Render Kubernetes manifests
        if: ${{ inputs.k8s_manifests_path != '' }}
        shell: bash
        env:
          AKS_KEYVAULT_CLIENT_ID: ${{ secrets.AKS_KEYVAULT_CLIENT_ID }}
          KEY_VAULT_NAME: ${{ secrets.KEY_VAULT_NAME }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          if grep -R "__AKS_KEYVAULT_CLIENT_ID__\|__KEY_VAULT_NAME__\|__AZURE_TENANT_ID__" "${{ inputs.k8s_manifests_path }}" >/dev/null; then
            if [[ -z "${AKS_KEYVAULT_CLIENT_ID}" || -z "${KEY_VAULT_NAME}" || -z "${AZURE_TENANT_ID}" ]]; then
              echo "AKS_KEYVAULT_CLIENT_ID, KEY_VAULT_NAME, and AZURE_TENANT_ID secrets are required to render Kubernetes manifests." >&2
              exit 1
            fi

            find "${{ inputs.k8s_manifests_path }}" -type f \( -name '*.yaml' -o -name '*.yml' \) -print0 |
              xargs -0 sed -i \
                -e "s|__AKS_KEYVAULT_CLIENT_ID__|${AKS_KEYVAULT_CLIENT_ID}|g" \
                -e "s|__KEY_VAULT_NAME__|${KEY_VAULT_NAME}|g" \
                -e "s|__AZURE_TENANT_ID__|${AZURE_TENANT_ID}|g"
          fi

      - name: Apply manifests
        if: ${{ inputs.k8s_manifests_path != '' }}
        shell: bash
        run: kubectl --kubeconfig "${KUBECONFIG}" apply -f "${{ inputs.k8s_manifests_path }}" -n "${{ inputs.k8s_namespace }}"

      - name: Update deployment image
        shell: bash
        run: |
          IMAGE="${{ inputs.azure_container_registry_name }}.azurecr.io/${{ inputs.image_name }}:${{ needs.build-scan-push.outputs.image_tag }}"

          kubectl --kubeconfig "${KUBECONFIG}" set image \
            deployment/${{ inputs.k8s_deployment_name }} \
            ${{ inputs.k8s_container_name }}="${IMAGE}" \
            -n "${{ inputs.k8s_namespace }}"

      - name: Wait for rolling update
        shell: bash
        run: |
          kubectl --kubeconfig "${KUBECONFIG}" rollout status \
            deployment/${{ inputs.k8s_deployment_name }} \
            -n "${{ inputs.k8s_namespace }}" \
            --timeout=300s

      - name: Healthcheck
        if: ${{ inputs.healthcheck_url != '' }}
        shell: bash
        run: |
          curl --fail --retry 10 --retry-delay 10 --retry-all-errors "${{ inputs.healthcheck_url }}"
