name: Reusable K3s Service Delivery

on:
  workflow_call:
    inputs:
      service_name:
        type: string
        required: true
      image_repository:
        description: Full GHCR image repository without tag.
        type: string
        required: true
      source_ref:
        description: Commit SHA whose sha-<short-sha> image was published by CI.
        type: string
        required: true
      k8s_namespace:
        type: string
        required: true
      k8s_deployment_name:
        type: string
        required: true
      k8s_container_name:
        type: string
        required: true
      k8s_manifest_path:
        description: Optional service-owned manifest file or Kustomize directory to apply before rollout.
        type: string
        default: ""
      k8s_apply_mode:
        description: Apply a single manifest file or a Kustomize directory.
        type: string
        default: manifest
      vps_host:
        description: VPS hostname or public IP used for the private K3s SSH tunnel.
        type: string
        required: true
      vps_deploy_user:
        description: SSH user that can read the K3s kubeconfig.
        type: string
        required: true
      healthcheck_url:
        type: string
        default: ""
      timeout_seconds:
        type: number
        default: 300
      environment:
        type: string
        default: production
    secrets:
      K3S_KUBECONFIG:
        required: true
      VPS_DEPLOY_SSH_KEY:
        required: true
      VPS_KNOWN_HOSTS:
        required: true

permissions:
  contents: read

concurrency:
  group: k3s-${{ inputs.environment }}-${{ inputs.service_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v5

      - name: Configure private Kubernetes access
        shell: bash
        env:
          K3S_KUBECONFIG: ${{ secrets.K3S_KUBECONFIG }}
          VPS_DEPLOY_SSH_KEY: ${{ secrets.VPS_DEPLOY_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 0700 "$HOME/.ssh" "${RUNNER_TEMP}/kube"
          printf '%s\n' "$VPS_DEPLOY_SSH_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$VPS_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          kubeconfig_path="${RUNNER_TEMP}/kube/config"
          printf '%s' "$K3S_KUBECONFIG" > "$kubeconfig_path"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts" "$kubeconfig_path"
          ssh -i "$HOME/.ssh/id_ed25519" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=10 -o ExitOnForwardFailure=yes \
            -N -L 6443:127.0.0.1:6443 "${{ inputs.vps_deploy_user }}@${{ inputs.vps_host }}" \
            </dev/null >"${RUNNER_TEMP}/fcs-k3s-tunnel.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/fcs-k3s-tunnel.pid"
          export KUBECONFIG="$kubeconfig_path"
          echo "KUBECONFIG=$kubeconfig_path" >> "$GITHUB_ENV"
          for _ in $(seq 1 30); do
            if ! kill -0 "$(cat "${RUNNER_TEMP}/fcs-k3s-tunnel.pid")" 2>/dev/null; then
              echo "The SSH tunnel exited before Kubernetes became reachable." >&2
              cat "${RUNNER_TEMP}/fcs-k3s-tunnel.log" >&2
              exit 1
            fi
            kubectl --request-timeout=5s get nodes > /dev/null 2>"${RUNNER_TEMP}/fcs-k3s-kubectl.log" && exit 0
            sleep 2
          done
          echo "Kubernetes was not reachable through the SSH tunnel." >&2
          cat "${RUNNER_TEMP}/fcs-k3s-tunnel.log" >&2
          cat "${RUNNER_TEMP}/fcs-k3s-kubectl.log" >&2
          exit 1

      - name: Checkout service repository
        if: ${{ inputs.k8s_manifest_path != '' }}
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref }}

      - name: Apply service Kubernetes resources
        if: ${{ inputs.k8s_manifest_path != '' }}
        shell: bash
        run: |
          set -euo pipefail
          manifest_path="${{ inputs.k8s_manifest_path }}"
          case "${{ inputs.k8s_apply_mode }}" in
            manifest)
              test -f "$manifest_path" || { echo "Kubernetes manifest not found: $manifest_path" >&2; exit 1; }
              kubectl -n "${{ inputs.k8s_namespace }}" apply -f "$manifest_path"
              ;;
            kustomize)
              test -d "$manifest_path" || { echo "Kustomize directory not found: $manifest_path" >&2; exit 1; }
              kubectl apply -k "$manifest_path"
              ;;
            *)
              echo "Unsupported k8s_apply_mode: ${{ inputs.k8s_apply_mode }}" >&2
              exit 1
              ;;
          esac

      - name: Verify restricted service access
        shell: bash
        run: |
          kubectl -n "${{ inputs.k8s_namespace }}" get \
            "deployment/${{ inputs.k8s_deployment_name }}"

      - name: Update immutable image and wait for rollout
        shell: bash
        run: |
          short_sha="${{ inputs.source_ref }}"
          short_sha="${short_sha:0:7}"
          image="${{ inputs.image_repository }}:sha-${short_sha}"
          deployed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          patch=$(cat <<EOF
          {"spec":{"template":{"metadata":{"annotations":{"fcs.platform/deployed-at":"${deployed_at}","fcs.platform/source-sha":"${{ inputs.source_ref }}","fcs.platform/image":"${image}","fcs.platform/github-run-id":"${{ github.run_id }}"}},"spec":{"containers":[{"name":"${{ inputs.k8s_container_name }}","image":"${image}"}]}}}}
          EOF
          )
          kubectl -n "${{ inputs.k8s_namespace }}" patch \
            "deployment/${{ inputs.k8s_deployment_name }}" \
            --type=strategic \
            --patch "$patch"
          kubectl -n "${{ inputs.k8s_namespace }}" rollout status \
            "deployment/${{ inputs.k8s_deployment_name }}" \
            --timeout="${{ inputs.timeout_seconds }}s"

      - name: Verify external healthcheck
        if: ${{ inputs.healthcheck_url != '' }}
        shell: bash
        run: curl --fail --retry 10 --retry-delay 10 --retry-all-errors "${{ inputs.healthcheck_url }}"

      - name: Close private Kubernetes tunnel
        if: always()
        shell: bash
        run: |
          test -f "${RUNNER_TEMP}/fcs-k3s-tunnel.pid" && kill "$(cat "${RUNNER_TEMP}/fcs-k3s-tunnel.pid")" || true
